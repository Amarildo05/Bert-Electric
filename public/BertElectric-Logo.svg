<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <radialGradient id="bg" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#6b68f0"/>
      <stop offset="45%" stop-color="#3532c0"/>
      <stop offset="100%" stop-color="#14128f"/>
    </radialGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="150" cy="150" r="148" fill="url(#bg)"/>
  <!-- Subtle top-left shine -->
  <circle cx="150" cy="150" r="148" fill="url(#shine)"/>

  <!-- BERT -->
  <text
    x="150"
    y="152"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
    font-size="78"
    font-weight="900"
    fill="white"
    text-anchor="middle"
  >BERT</text>

  <!-- Divider -->
  <rect x="52" y="166" width="196" height="1.5" fill="white" fill-opacity="0.35" rx="0.75"/>

  <!-- ELECTRIC — x offset by +4.5 to visually center with letter-spacing -->
  <text
    x="154.5"
    y="206"
    font-family="Arial, Helvetica, sans-serif"
    font-size="26"
    font-weight="400"
    fill="white"
    fill-opacity="0.92"
    text-anchor="middle"
    letter-spacing="9"
  >ELECTRIC</text>
</svg>
